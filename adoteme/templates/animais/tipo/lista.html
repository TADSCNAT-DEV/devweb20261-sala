<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Animais - Adote-me</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <section class="section">
        <div class="container">
            <h1 class="title is-2 has-text-centered mb-6">
                <i class="fas fa-paw"></i> Tipos de Animais
            </h1>

            <!-- Formulário de Busca -->
            <div class="box mb-5">
                <form method="GET" action="">
                    <div class="field has-addons">
                        <div class="control is-expanded">
                            <input class="input" type="text" name="busca" placeholder="Buscar tipo de animal..." value="{{busca|default:""}}">
                        </div>
                        <div class="control">
                            <button class="button is-info" type="submit">
                                <span class="icon">
                                    <i class="fas fa-search"></i>
                                </span>
                                <span>Buscar</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Lista de Tipos de Animais -->
            <div class="box">
                {% if tipos %}
                    <table class="table is-fullwidth is-striped is-hoverable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome do Tipo</th>
                                <th class="has-text-centered">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for tipo in tipos %}
                            <tr>
                                <td>{{ tipo.id }}</td>
                                <td>
                                    <span class="icon-text">
                                        <span class="icon has-text-info">
                                            <i class="fas fa-tag"></i>
                                        </span>
                                        <span>{{ tipo.nome }}</span>
                                    </span>
                                </td>
                                <td class="has-text-centered">
                                    <div class="buttons is-centered">
                                        
                                        <button class="button is-small is-warning is-light">
                                            <span class="icon">
                                                <i class="fas fa-edit"></i>
                                            </span>
                                            <span>Editar</span>
                                        </button>
                                        <button class="button is-small is-danger is-light">
                                            <span class="icon">
                                                <i class="fas fa-trash"></i>
                                            </span>
                                            <span>Excluir</span>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    
                    <div class="notification is-info is-light mt-4">
                        <p class="has-text-centered">
                            <strong>Total de tipos cadastrados:</strong> {{ tipos|length }}
                        </p>
                    </div>
                {% else %}
                    <div class="notification is-warning">
                        <p class="has-text-centered">
                            <span class="icon">
                                <i class="fas fa-exclamation-triangle"></i>
                            </span>
                            <span>Nenhum tipo de animal cadastrado ainda.</span>
                        </p>
                    </div>
                {% endif %}
            </div>

            <!-- Botão de Adicionar -->
            <div class="has-text-centered mt-5">
                <button class="button is-success is-medium">
                    <span class="icon">
                        <i class="fas fa-plus"></i>
                    </span>
                    <span>Adicionar Novo Tipo</span>
                </button>
            </div>
        </div>
    </section>
</body>
</html>
