<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}Adote-me | Encontre um novo melhor amigo{% endblock %}</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
    {% load static %}
    	<link rel="stylesheet" href="{% static 'css/base_landing.css' %}">
	{% block extra_head %}{% endblock %}
</head>
<body>
	<section class="section pb-0">
		<div class="container">
			<nav class="navbar is-transparent mb-4" role="navigation" aria-label="main navigation">
				<div class="navbar-brand">
					<a class="navbar-item has-text-weight-bold is-size-5" href="{% url 'principal:index'%}">
						<span class="icon has-text-warning-dark"><i class="fas fa-paw"></i></span>
						<span>Adote-me</span>
					</a>
				</div>
				<div class="navbar-menu is-active">
					<div class="navbar-end">
						<a class="navbar-item" href="#sobre">Sobre</a>
						<a class="navbar-item" href="{% url 'principal:contato'%}">Contato</a>
						<a class="navbar-item" href="{% url 'principal:index_logado' %}">Area Logada</a>
					</div>
				</div>
			</nav>

			
		</div>
	</section>

	

	<section id="animais" class="section pt-0">
		<div class="container">
			{% block content %}{% endblock %}
		</div>
	</section>

	<a href="#consulta" class="button is-warning is-medium floating-cta">
		<span class="icon"><i class="fas fa-search"></i></span>
		<span>Consultar</span>
	</a>

	{% block extra_scripts %}{% endblock %}
</body>
</html>
