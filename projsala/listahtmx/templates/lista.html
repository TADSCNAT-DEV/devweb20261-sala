<div class="box">
    <table class="table is-fullwidth is-striped is-hoverable mt-5">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Curso</th>
                    </tr>
                </thead>
                <tbody>
                    {% for aluno in alunos %}
                        <tr>
                            <td>{{ aluno.nome }}</td>
                            <td>{{ aluno.curso }}</td>
                        </tr>
                    {% empty %}
                        <tr>
                            <td colspan="2" class="has-text-centered">Nenhum resultado encontrado.</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
</div>
