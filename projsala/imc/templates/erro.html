<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Aplicação</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <section class="hero is-fullheight is-danger">
        <div class="hero-body">
            <div class="container has-text-centered">
                <div class="box" style="max-width: 500px; margin: 0 auto;">
                    <div class="level is-mobile mb-4">
                        <div class="level-item">
                            <div class="heading">
                                <span class="icon is-large has-text-danger">
                                    <i class="fas fa-3x fa-exclamation-triangle"></i>
                                </span>
                            </div>
                        </div>
                    </div>

                    <h1 class="title is-2">Erro</h1>
                    <h2 class="subtitle is-4">Oops! Algo deu errado</h2>

                    <div class="content has-text-justified mb-5">
                        {% if mensagem %}
                           <div class="notification is-warning">
                                <button class="delete"></button>
                                {{ mensagem }}
                           </div>
                        {% else %}
                            <p>Ocorreu um erro inesperado. Por favor, tente novamente.</p>
                        {% endif %}
                    </div>

                    <div class="buttons is-centered">
                        <button class="button is-light" onclick="history.back()">
                            <span class="icon">
                                <i class="fas fa-arrow-left"></i>
                            </span>
                            <span>Voltar</span>
                        </button>

                        <a href="/" class="button is-danger">
                            <span class="icon">
                                <i class="fas fa-home"></i>
                            </span>
                            <span>Início</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="content has-text-centered">
            <p>
                <strong>Aplicação</strong> &copy; 2024 - Todos os direitos reservados
            </p>
        </div>
    </footer>
</body>
</html>
