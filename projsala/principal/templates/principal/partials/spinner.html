<div id="{{ id|default:'global-spinner' }}" class="htmx-indicator">
    <div class="box p-5" style="text-align: center;">
        {# O spinner nativo do Bulma #}
        <div class="loader mx-auto" 
             style="height: {{ size|default:'2rem' }}; width: {{ size|default:'2rem' }}; border-width: 0.25em;">
        </div>
        
        {# Mensagem opcional #}
        {% if message != 'false' %}
            <p class="mt-3 has-text-weight-medium">
                {{ message|default:'Carregando...' }}
            </p>
        {% endif %}
    </div>
</div>
